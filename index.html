<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Completa - Provisões Especiais</title>
    <style>
        :root { --primary: #003366; --secondary: #f0f4f8; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--secondary); padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--secondary); padding-bottom: 10px; }
        .search-box { position: relative; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 18px; outline: none; transition: border 0.3s; }
        input:focus { border-color: var(--primary); }
        .result-card { background: #fff; border-left: 6px solid var(--primary); padding: 20px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: none; }
        .code-title { font-size: 24px; font-weight: bold; color: var(--primary); margin-bottom: 10px; display: block; }
        .description { line-height: 1.6; font-size: 16px; }
        .not-found { color: #d9534f; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Consulta de Provisões Especiais</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Digite o código (ex: A1, A20, A180...)" oninput="searchProvision()">
    </div>

    <div id="resultCard" class="result-card">
        <span class="code-title" id="resCode"></span>
        <div class="description" id="resDesc"></div>
    </div>

    <div id="notFound" class="not-found">Nenhuma provisão encontrada com este código.</div>
</div>

<script>
    // Aqui você deve colar TODAS as provisões do seu arquivo
    // Você pode extrair do PDF ou do arquivo que está no seu GitHub
    const db = {
        "A1": "Este artigo ou substância só pode ser transportado em aeronaves de passageiros com a aprovação prévia da autoridade competente...",
        "A2": "Transporte permitido em aeronaves de carga apenas com aprovação prévia da autoridade apropriada do Estado de origem e do operador.",
        "A3": "Se as propriedades químicas/físicas não atenderem aos critérios de definição da classe listada, não está sujeito a estes regulamentos.",
        "A12": "Sulfetos e óxidos de antimónio com 0,5% ou menos de arsênio não estão sujeitos a estes regulamentos.",
        "A51": "Baterias de aeronave até 100kg de peso líquido podem ser transportadas independentemente do limite da coluna J.",
        "A180": "Espécimes não-infecciosas com pequenas quantidades de álcool... não estão sujeitas ao regulamento sob condições de embalagem.",
        // ADICIONE AS DEMAIS AQUI SEGUINDO O PADRÃO "CÓDIGO": "TEXTO",
    };

    function searchProvision() {
        const input = document.getElementById('searchInput').value.toUpperCase().trim();
        const card = document.getElementById('resultCard');
        const notFound = document.getElementById('notFound');
        const resCode = document.getElementById('resCode');
        const resDesc = document.getElementById('resDesc');

        if (input === "") {
            card.style.display = 'none';
            notFound.style.display = 'none';
            return;
        }

        if (db[input]) {
            resCode.innerText = input;
            resDesc.innerText = db[input];
            card.style.display = 'block';
            notFound.style.display = 'none';
        } else {
            card.style.display = 'none';
            notFound.style.display = 'block';
        }
    }
</script>

</body>
</html>
